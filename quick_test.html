<!DOCTYPE html>
<html>
<head>
    <title>Quick Server Test</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .test { padding: 10px; margin: 5px 0; border-left: 4px solid #ccc; }
        .pass { border-color: green; background: #f0fff0; }
        .fail { border-color: red; background: #fff0f0; }
        .loading { border-color: orange; background: #fff8f0; }
    </style>
</head>
<body>
    <h1>Server Connection Test</h1>
    <div id="results"></div>
    
    <script>
        const r = document.getElementById('results');
        
        function add(msg, pass) {
            const d = document.createElement('div');
            d.className = 'test ' + (pass ? 'pass' : 'fail');
            d.textContent = (pass ? '✓ ' : '✗ ') + msg;
            r.appendChild(d);
        }
        
        function load(msg) {
            const d = document.createElement('div');
            d.className = 'test loading';
            d.textContent = '⏳ ' + msg;
            d.id = 'loading';
            r.appendChild(d);
        }
        
        function removeLoad() {
            const l = document.getElementById('loading');
            if (l) l.remove();
        }
        
        // Test 1: Basic connection
        load('Testing server...');
        fetch('/')
            .then(r => {
                removeLoad();
                if (r.ok) {
                    add('Server is responding', true);
                    testData();
                } else {
                    add('Server returned: ' + r.status, false);
                }
            })
            .catch(e => {
                removeLoad();
                add('Connection failed: ' + e.message, false);
            });
        
        // Test 2: Data files
        async function testData() {
            const files = [
                '/data/incidents_in_progress.csv',
                '/data/landmark_cases.csv',
                '/data/mp-lgbtiq-votes.json'
            ];
            
            for (const f of files) {
                load('Testing ' + f);
                try {
                    const res = await fetch(f);
                    removeLoad();
                    if (res.ok) {
                        const ct = res.headers.get('content-type') || 'unknown';
                        add(f + ' - OK (' + ct + ')', true);
                    } else {
                        add(f + ' - Failed: ' + res.status, false);
                    }
                } catch (e) {
                    removeLoad();
                    add(f + ' - Error: ' + e.message, false);
                }
            }
        }
    </script>
</body>
</html>
