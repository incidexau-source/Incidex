name: Daily Hate Crime Detection

on:
  schedule:
    # Runs at 9:00 AM AEDT (Adelaide timezone) every day
    # AEDT is UTC+11, so 9:00 AM AEDT = 10:00 PM UTC previous day
    - cron: '0 22 * * *'
  
  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  scrape-and-detect:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      # Step 3: Install dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # Step 4: Run the hate crime detection script
      - name: Run hate crime detection
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python hate_crime_alerts.py
      
      # Step 5: Notify on failure
      - name: Notify Discord on failure
        if: failure()
        uses: tsickert/discord-webhook@v5.3.0
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          content: |
            ❌ **Hate Crime Detection Failed**
            The automated detection script failed to run.
            Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
