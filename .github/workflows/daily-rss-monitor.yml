name: Daily RSS Monitoring

on:
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run RSS monitoring
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          REVIEWER_EMAIL: ${{ secrets.REVIEWER_EMAIL }}
          APPROVAL_SECRET: ${{ secrets.APPROVAL_SECRET }}
        run: |
          cd scripts
          python rss_agent.py
      
      - name: Commit results
        run: |
          git config user.email "action@github.com"
          git config user.name "RSS Monitor Bot"
          git add data/incidents_in_progress.csv data/approvals/*.json data/approvals/*.jsonl daily_report.txt || true
          git commit -m "Update: Daily RSS monitoring results with approval workflow" || true
          git push || true

