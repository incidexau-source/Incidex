name: Daily RSS Monitor

on:
  schedule:
    # Run daily at 2:00 AM AEST (UTC+10) = 4:00 PM UTC (previous day)
    # Note: GitHub Actions uses UTC time
    - cron: '0 16 * * *'  # 4:00 PM UTC = 2:00 AM AEST (next day)
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  monitor:
    name: RSS Feed Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Set timeout to prevent hanging
    permissions:
      contents: write  # Required to push commits
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for git operations
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run RSS Monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/rss_monitor.py --hours-back 24
      
      - name: Commit and push if changes (backup)
        if: failure()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Only commit if there are changes to data files
          if [ -n "$(git status --porcelain data/incidents_news_sourced.csv)" ]; then
            git add data/incidents_news_sourced.csv
            git commit -m "Daily RSS Monitor: Add new incidents $(date +'%Y-%m-%d') [auto-commit]"
            git push
          fi
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rss-monitor-logs-${{ github.run_id }}
          path: |
            logs/*.json
            logs/*.txt
            geocoding_cache.json
          retention-days: 30
          if-no-files-found: ignore
      
      - name: Report summary
        if: always()
        run: |
          echo "## RSS Monitor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Completed at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/incidents_news_sourced.csv" ]; then
            echo "✓ Incidents file exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "File size: $(du -h data/incidents_news_sourced.csv | cut -f1)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠ Incidents file not found" >> $GITHUB_STEP_SUMMARY
          fi

