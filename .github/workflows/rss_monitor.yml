name: Daily RSS Monitor

on:
  schedule:
    # Run daily at 2:00 AM AEDT (UTC+11) = 3:00 PM UTC (previous day)
    # Note: GitHub Actions uses UTC time
    # For 2 AM AEDT (AEDT = UTC+11), we need 3 PM UTC previous day
    # Actually, during standard time (AEST = UTC+10), 2 AM AEST = 4 PM UTC previous day
    # To handle both, we'll use 4 PM UTC (2 AM AEST) and 3 PM UTC (2 AM AEDT)
    # Using 4 PM UTC which covers most of the year (AEST)
    - cron: '0 16 * * *'  # 4:00 PM UTC = 2:00 AM AEST (next day)
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  monitor:
    name: RSS Feed Monitor
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Set timeout to prevent hanging
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run RSS Monitor
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python monitor.py --hours-back 24
      
      - name: Commit and push if changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Only commit if there are changes to data files
          if [ -n "$(git status --porcelain data/incidents_news_sourced.csv)" ]; then
            git add data/incidents_news_sourced.csv
            git commit -m "Daily RSS Monitor: Add new incidents $(date +'%Y-%m-%d')"
            git push
          else
            echo "No new incidents to commit"
          fi
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rss-monitor-logs-${{ github.run_id }}
          path: |
            logs/*.json
            logs/*.txt
          retention-days: 30
      
      - name: Report summary
        if: always()
        run: |
          echo "## RSS Monitor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Completed at: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "data/incidents_news_sourced.csv" ]; then
            echo "Incidents file exists" >> $GITHUB_STEP_SUMMARY
          fi






